<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Prueba 1</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header>
    <h1>Pagina Principal</h1>
    <nav>
      <a href="index.html">Inicio</a>
      <a href="segunda.html">Segunda</a>
    </nav>
  </header>

  <main class="card">
    <h2>Prueba de Interaccion</h2>

    <input id="texto" placeholder="Escribe algo..." />
    <button id="btn">Mostrar</button>

    <p id="resultado">Aqui aparecera el texto</p>
  </main>

  <footer>
    <small>Pruebas HTML basicas</small>
  </footer>

  <script>
    document.getElementById("btn").addEventListener("click", function() {
      const valor = document.getElementById("texto").value;
      document.getElementById("resultado").textContent =
        "Escribiste: " + (valor || "(vacio)");
    });
  </script>

</body>
</html>
